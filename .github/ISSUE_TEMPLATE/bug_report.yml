name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - snx-edge-server
        - snx-edge-client
        - Docker / deployment
        - RouterOS integration
        - Documentation
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `snx-edge-server --version` or git commit hash
      placeholder: "0.1.0 / abc1234"

  - type: input
    id: routeros
    attributes:
      label: RouterOS Version
      placeholder: "7.16 (ARM64)"

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant logs (use `RUST_LOG=debug` for verbose output)
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information (screenshots, config snippets, etc.)
