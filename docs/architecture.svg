<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" font-family="'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#64748b"/>
    </marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#0ea5e9"/>
    </marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f59e0b"/>
    </marker>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="480" rx="12" fill="#fafafa"/>
  <rect width="860" height="480" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ===== WORKSTATION ===== -->
  <text x="90" y="28" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="2">WORKSTATION</text>

  <!-- snx-edge-client -->
  <rect x="20" y="42" width="140" height="90" rx="10" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="20" y="42" width="140" height="24" rx="10" fill="#6366f1"/>
  <rect x="20" y="56" width="140" height="10" fill="#6366f1"/>
  <text x="90" y="59" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">snx-edge-client</text>
  <text x="90" y="82" text-anchor="middle" fill="#475569" font-size="9">GTK4 Tray App</text>
  <text x="90" y="96" text-anchor="middle" fill="#94a3b8" font-size="8.5">Status / Profiles / Routing</text>
  <text x="90" y="108" text-anchor="middle" fill="#94a3b8" font-size="8.5">Users / Logs / Servers</text>

  <!-- snx-edge-ctl -->
  <rect x="20" y="148" width="140" height="56" rx="10" fill="#fff" stroke="#0ea5e9" stroke-width="1.5"/>
  <rect x="20" y="148" width="140" height="24" rx="10" fill="#0ea5e9"/>
  <rect x="20" y="162" width="140" height="10" fill="#0ea5e9"/>
  <text x="90" y="165" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">snx-edge-ctl</text>
  <text x="90" y="188" text-anchor="middle" fill="#475569" font-size="9">CLI Client</text>

  <!-- ===== MIKROTIK ROUTER ===== -->
  <text x="430" y="28" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="2">MIKROTIK ROUTER</text>

  <!-- Router outer -->
  <rect x="230" y="42" width="370" height="290" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Container dashed -->
  <text x="415" y="62" text-anchor="middle" fill="#94a3b8" font-size="9" letter-spacing="1">CONTAINER</text>
  <rect x="250" y="70" width="330" height="140" rx="10" fill="#fff" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- axum API -->
  <rect x="270" y="86" width="120" height="70" rx="8" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
  <rect x="270" y="86" width="120" height="22" rx="8" fill="#10b981"/>
  <rect x="270" y="100" width="120" height="8" fill="#10b981"/>
  <text x="330" y="102" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">axum API</text>
  <text x="330" y="122" text-anchor="middle" fill="#475569" font-size="9">REST + SSE</text>
  <text x="330" y="136" text-anchor="middle" fill="#94a3b8" font-size="8.5">JWT / RBAC</text>

  <!-- snxcore -->
  <rect x="440" y="86" width="120" height="70" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="440" y="86" width="120" height="22" rx="8" fill="#f59e0b"/>
  <rect x="440" y="100" width="120" height="8" fill="#f59e0b"/>
  <text x="500" y="102" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">snxcore</text>
  <text x="500" y="122" text-anchor="middle" fill="#475569" font-size="9">VPN Tunnel</text>
  <text x="500" y="136" text-anchor="middle" fill="#94a3b8" font-size="8.5">IKE / ESP</text>

  <!-- axum → snxcore -->
  <line x1="390" y1="121" x2="436" y2="121" stroke="#64748b" stroke-width="1" marker-end="url(#a1)"/>

  <!-- SQLite -->
  <rect x="270" y="172" width="70" height="26" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="305" y="189" text-anchor="middle" fill="#64748b" font-size="9">SQLite</text>

  <!-- tun0 -->
  <rect x="460" y="172" width="60" height="26" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="490" y="189" text-anchor="middle" fill="#64748b" font-size="9">tun0</text>

  <!-- ip_forward -->
  <text x="400" y="190" text-anchor="middle" fill="#cbd5e1" font-size="8" font-style="italic">ip_forward=1</text>

  <!-- axum → SQLite -->
  <line x1="305" y1="156" x2="305" y2="169" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#a1)"/>

  <!-- snxcore → tun0 -->
  <line x1="490" y1="156" x2="490" y2="169" stroke="#f59e0b" stroke-width="1" marker-end="url(#a3)"/>

  <!-- RouterOS REST arrow -->
  <line x1="330" y1="210" x2="330" y2="256" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#a4)"/>
  <text x="356" y="238" fill="#a78bfa" font-size="8" font-weight="500">RouterOS REST</text>

  <!-- PBR bar -->
  <rect x="250" y="262" width="330" height="54" rx="8" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1"/>
  <text x="415" y="282" text-anchor="middle" fill="#6d28d9" font-size="10" font-weight="600">Firewall  →  Mangle  →  Policy-Based Routing</text>
  <text x="415" y="298" text-anchor="middle" fill="#8b5cf6" font-size="8.5">vpn-clients  ·  vpn-bypass  ·  vpn-route  ·  kill-switch  ·  DNS dst-nat</text>

  <!-- ===== CHECK POINT ===== -->
  <text x="750" y="28" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="2">CHECK POINT</text>

  <!-- VPN Gateway -->
  <rect x="680" y="42" width="140" height="90" rx="10" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="680" y="42" width="140" height="24" rx="10" fill="#ef4444"/>
  <rect x="680" y="56" width="140" height="10" fill="#ef4444"/>
  <text x="750" y="59" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">VPN Gateway</text>
  <text x="750" y="82" text-anchor="middle" fill="#475569" font-size="9">Check Point</text>
  <text x="750" y="96" text-anchor="middle" fill="#94a3b8" font-size="8.5">IPSec / CCC Protocol</text>

  <!-- ===== CONNECTIONS ===== -->

  <!-- Client → axum -->
  <line x1="160" y1="87" x2="266" y2="105" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#a2)"/>
  <rect x="178" y="80" width="56" height="16" rx="4" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="0.5"/>
  <text x="206" y="92" text-anchor="middle" fill="#0284c7" font-size="8" font-weight="500">REST/SSE</text>

  <!-- CLI → axum -->
  <line x1="160" y1="176" x2="266" y2="135" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#a2)"/>
  <rect x="178" y="155" width="40" height="16" rx="4" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="0.5"/>
  <text x="198" y="167" text-anchor="middle" fill="#0284c7" font-size="8" font-weight="500">REST</text>

  <!-- snxcore → VPN Gateway -->
  <line x1="560" y1="115" x2="676" y2="87" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a3)"/>
  <rect x="590" y="86" width="62" height="16" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="621" y="98" text-anchor="middle" fill="#b45309" font-size="8" font-weight="500">ESP/TCPT</text>

  <!-- ===== LAN CLIENTS ===== -->
  <text x="430" y="368" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="2">LAN CLIENTS</text>

  <rect x="270" y="382" width="100" height="38" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="320" y="401" text-anchor="middle" fill="#475569" font-size="9">PC</text>
  <text x="320" y="413" text-anchor="middle" fill="#a78bfa" font-size="8">vpn-clients</text>

  <rect x="385" y="382" width="100" height="38" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="435" y="401" text-anchor="middle" fill="#475569" font-size="9">Phone</text>
  <text x="435" y="413" text-anchor="middle" fill="#a78bfa" font-size="8">vpn-clients</text>

  <rect x="500" y="382" width="100" height="38" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="550" y="401" text-anchor="middle" fill="#475569" font-size="9">Server</text>
  <text x="550" y="413" text-anchor="middle" fill="#94a3b8" font-size="8">vpn-bypass</text>

  <!-- LAN → PBR -->
  <line x1="320" y1="382" x2="350" y2="320" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5" marker-end="url(#a4)"/>
  <line x1="435" y1="382" x2="415" y2="320" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5" marker-end="url(#a4)"/>
  <line x1="550" y1="382" x2="480" y2="320" stroke="#94a3b8" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="3,3"/>

  <!-- ===== LEGEND ===== -->
  <rect x="20" y="434" width="200" height="32" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="32" y1="451" x2="50" y2="451" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="54" y="455" fill="#64748b" font-size="8">Management</text>
  <line x1="104" y1="451" x2="122" y2="451" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="126" y="455" fill="#64748b" font-size="8">VPN Tunnel</text>
  <line x1="172" y1="451" x2="190" y2="451" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="194" y="455" fill="#64748b" font-size="8">PBR</text>
</svg>
