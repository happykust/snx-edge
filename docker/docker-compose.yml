services:
  snx-edge-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    cap_add:
      - NET_ADMIN
    devices:
      - "/dev/net/tun:/dev/net/tun"
    environment:
      # SNX_EDGE_JWT_SECRET must be at least 32 characters
      - SNX_EDGE_JWT_SECRET=${SNX_EDGE_JWT_SECRET}
      - SNX_EDGE_ADMIN_USER=admin
      - SNX_EDGE_ADMIN_PASSWORD=admin12345
      - ROUTEROS_HOST=${ROUTEROS_HOST:-172.19.0.1}
      - ROUTEROS_USER=${ROUTEROS_USER:-snx-edge}
      - ROUTEROS_PASSWORD=${ROUTEROS_PASSWORD:-changeme}
      - RUST_LOG=info
    volumes:
      - snx-data:/var/lib/snx-edge
      - snx-logs:/var/log/snx-edge
      - ./config.toml.example:/etc/snx-edge/config.toml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  snx-data:
  snx-logs:
